options:
  logging: CLOUD_LOGGING_ONLY

serviceAccount: "projects/my-project-app-477009/serviceAccounts/433503387155-compute@developer.gserviceaccount.com"

substitutions:
  _TAG: $SHORT_SHA
  _IMAGE: "us-central1-docker.pkg.dev/my-project-app-477009/my-artifact-repo/my-project-app-477009"

steps:
  
  # ------------------------------------------------------
  ## 1) Install Terraform
  # -------------------------------------------------------
  - name: hashicorp/terraform:1.6.6
    entrypoint: "sh"
    id: "Terraform Init & Apply"
    args:
      - "-c"
      - |
        cd infra
        echo "🔧 Initializing Terraform..."
        terraform init -input=false

        echo "📄 Planning Terraform..."
        terraform plan -out=tfplan -input=false

        echo "🚀 Applying Terraform..."
     #   terraform apply -input=false -auto-approve tfplan
  
    

  # ---------------------------------------------------------
  # 1.1) Initialize Database (create table)
  # ---------------------------------------------------------
  - name: python:3.11
    id: "Init Database"
    entrypoint: bash
    args:
      - "-c"
      - |
        echo "🔧 Loading environment variables from .env..."
        if [ -f .env ]; then
            set -o allexport
            source .env
            set +o allexport
        else
          echo "⚠ .env file not found!"
          exit 1
        fi
        cd app
        pip install -r requirements.txt
        INIT_DB_ONLY=true python app.py
  # ----------------------------------------------------------
  # 2) Build Docker Image with UNIQUE TAG
  # ----------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: "Build Docker Image"
    args:
      [
        "build",
        "-t",
        "${_IMAGE}:${_TAG}",
        "-f",
        "app/Dockerfile",
        "."
      ]


  # ----------------------------------------------------------
  # 3) Push Docker Image
  # ----------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: "Push Docker Image"
    args:
      [
        "push",
        "${_IMAGE}:${_TAG}"
      ]


  # ----------------------------------------------------------
  # 4) Deploy to GKE
  # ----------------------------------------------------------
  - name: "gcr.io/cloud-builders/gcloud"
    id: "Deploy to GKE"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "🚀 Starting deployment to GKE..."

        gcloud container clusters get-credentials products-gke-cluster1 \
          --zone=us-central1-a \
          --project=my-project-app-477009
        echo "📦 Applying Kubernetes manifests..."
        
        kubectl apply -f k8s/deployment.yaml
        
       
        echo "🔄 Updating Deployment with new image: ${_IMAGE}:${_TAG}"

        kubectl set image deployment/my-project-app-477009 my-project-app-477009=${_IMAGE}:${_TAG}

        echo "⏳ Waiting for rollout..."
        kubectl rollout status deployment/my-project-app-477009 --timeout=120s || (
          echo "❌ Rollout failed"
          kubectl describe deployment my-project-app-477009
          kubectl get pods -o wide
          exit 1
        )


  # ----------------------------------------------------------
  # 5) Post-deployment checks & integration tests
  # ----------------------------------------------------------
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Post-Deployment Checks & Integration Tests'
    entrypoint: 'bash'
    env:
      - API_KEY=chinnu31

    args:
      - '-c'
      - |
        set -euo pipefail

        echo " Running post-deployment checks..."

        LB_IP=$$(kubectl get ingress product-api-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' --ignore-not-found || true)
        MAX_RETRIES=12
        RETRY=0

        while [ -z "$$LB_IP" ] && [ $$RETRY -lt $$MAX_RETRIES ]; do
          echo "Waiting for LoadBalancer IP... (retry $$RETRY/$$MAX_RETRIES)"
          sleep 10
          LB_IP=$$(kubectl get svc my-project-app-477009-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}' --ignore-not-found || true)
          RETRY=$$((RETRY+1))
        done

        if [ -z "$$LB_IP" ]; then
          echo " LoadBalancer IP not found. Diagnosing..."
          kubectl get svc my-project-app-477009-service -o yaml || true
          kubectl describe svc my-project-app-477009-service || true
          kubectl get pods -l app=my-project-app-477009 -o wide || true
          kubectl describe deployment my-project-app-477009 || true
          kubectl get events --sort-by=.metadata.creationTimestamp | tail -n 50 || true
          exit 1
        fi

        echo " LoadBalancer IP resolved: $$LB_IP"

        echo "⏳ Checking /products endpoint..."
        for i in $$(seq 1 8); do
          http_status=$$(curl -s -o /dev/null -w "%{http_code}" "http://$$LB_IP/products" || echo "000")
          echo "Attempt $$i: HTTP $$http_status"
          if [ "$$http_status" = "200" ]; then
            echo " /products returned 200 OK"
            break
          fi
          sleep 5
        done

        if [ "$$http_status" != "200" ]; then
          echo " /products endpoint failing."
          kubectl get pods -l app=my-project-app-477009 -o wide || true
          kubectl describe deployment my-project-app-477009 || true
          kubectl describe svc my-project-app-477009-service || true
          kubectl get events --sort-by=.metadata.creationTimestamp | tail -n 50 || true
          exit 1
        fi

        echo " Running integration tests..."
        chmod +x tests/integration_test.sh || true
        LB="$$LB_IP" bash tests/integration_test.sh

        echo " Integration tests passed."


  
images:
  - "${_IMAGE}:${_TAG}"
