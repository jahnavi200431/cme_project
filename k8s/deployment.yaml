apiVersion: apps/v1
kind: Deployment
metadata:
  name: gke-rest-api
  labels:
    app: gke-rest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gke-rest-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # ensures at least one pod stays running during update
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gke-rest-api
    spec:
      serviceAccountName: app-workload-sa
      nodeSelector:
        cloud.google.com/gke-nodepool: cloudsql-pool
      containers:
        - name: gke-rest-api
          image: us-central1-docker.pkg.dev/my-project-app-477009/my-artifact-repo/gke-rest-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "appdb"
            - name: DB_USER
              value: "user1"
            - name: GCP_PROJECT_ID
              value: my-project-app-477009
            - name: INIT_DB_ONLY
              value: "false"  
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.10.0
          args:
            - "my-project-app-477009:us-central1:products-db-instance1"
            - "--address=127.0.0.1"
            - "--port=5432"
            - "--auto-iam-authn"
            - "--private-ip"
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "50m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: gke-rest-api-lb
  labels:
    app: gke-rest-api
spec:
  type: LoadBalancer
  selector:
    app: gke-rest-api
  ports:
    - protocol: TCP
      port: 80        # external port
      targetPort: 8080  # container port
