apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: api-backendconfig
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    port: 8080
    requestPath: /health

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-project-app-477009
  labels:
    app: my-project-app-477009
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: my-project-app-477009
  template:
    metadata:
      labels:
        app: my-project-app-477009
    spec:
      containers:
        - name: my-project-app-477009
          image: us-central1-docker.pkg.dev/my-project-app-477009/my-artifact-repo/my-project-app-477009:latest
          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: secret-volume
              mountPath: /mnt/secrets
              readOnly: true

          env:
            - name: DB_HOST
              value: localhost
            - name: DB_NAME
              value: "appdb"
            - name: DB_USER
              value: "user1"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASS
            - name: DB_PORT
              value: "5432"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: API_KEY

      volumes:
        - name: secret-volume
          csi:
            driver: secrets-store.csi.k8s.io
            volumeAttributes:
              secretProviderClass: gcp-secret-provider


---

apiVersion: v1
kind: Service
metadata:
  name: my-project-app-477009-service
spec:
  type: LoadBalancer
  selector:
    app: my-project-app-477009
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-project-app-477009-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-project-app-477009
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60


