# -------------------------------------------------------------------
# 1) Kubernetes ServiceAccount (for Workload Identity)
# -------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-workload-sa
  namespace: default
---
# -------------------------------------------------------------------
# 2) SecretProviderClass (Secret Manager CSI Driver) - GCP provider
#    This mounts secrets from Google Secret Manager and creates a
#    Kubernetes Secret "db-credentials" containing DB_PASS and API_KEY.
# -------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-secrets-spc
  namespace: default
spec:
  provider: gcp
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: db_password
          key: DB_PASS
        - objectName: api-key
          key: API_KEY
  parameters:
    secrets: |
      - resourceName: "projects/my-project-app-477009/secrets/db_password"
        fileName: "db_password"
        version: "latest"
      - resourceName: "projects/my-project-app-477009/secrets/api-key"
        fileName: "api-key"
        version: "latest"
---
# -------------------------------------------------------------------
# 3) Deployment: app container + Cloud SQL Proxy sidecar
# -------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gke-rest-api
  labels:
    app: gke-rest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gke-rest-api
  template:
    metadata:
      labels:
        app: gke-rest-api
    spec:
      serviceAccountName: app-workload-sa
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "gcp-secrets-spc"
      containers:
        # -------------------------------
        # Main application container
        # -------------------------------
        - name: gke-rest-api
          image: us-central1-docker.pkg.dev/my-project-app-477009/my-artifact-repo/gke-rest-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "appdb"
            - name: DB_USER
              value: "user1"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASS
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
        # -------------------------------
        # Cloud SQL Proxy sidecar
        # -------------------------------
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.10.0
          args:
            - "--address=127.0.0.1"
            - "--port=5432"
            - "--auto-iam-authn"
            - "--instance=my-project-app-477009:us-central1:products-db-instance=tcp:5432"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
---
# -------------------------------------------------------------------
# 4) Service (LoadBalancer)
# -------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: gke-rest-api-service
  labels:
    app: gke-rest-api
spec:
  type: LoadBalancer
  selector:
    app: gke-rest-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# -------------------------------------------------------------------
# 5) HorizontalPodAutoscaler
# -------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gke-rest-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gke-rest-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
