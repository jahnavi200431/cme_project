apiVersion: apps/v1
kind: Deployment
metadata:
  name: gke-rest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gke-rest-api
  template:
    metadata:
      labels:
        app: gke-rest-api
    spec:
      containers:

      # -------------------------------
      # 🔥 Main Application (runs app.py)
      # -------------------------------
      - name: rest-api
        image: us-central1-docker.pkg.dev/my-project-app-477009/my-artifact-repo/gke-rest-api:latest
        ports:
          - containerPort: 8080
        env:
          - name: DB_HOST
            value: "127.0.0.1"
          - name: DB_PORT
            value: "5432"
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: DB_NAME
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: DB_USER
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: DB_PASS

      # --------------------------------------
      # 🟢 Cloud SQL Proxy — Only DB Tunnel
      # --------------------------------------
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.10.0
        args:
          - "--address=0.0.0.0"
          - "--port=5432"
          - "--private-ip=false"
          - "--auto-iam-authn"
          - "my-project-app-477009:us-central1:products-db-instance=tcp:5432"
        ports:
          - containerPort: 5432
