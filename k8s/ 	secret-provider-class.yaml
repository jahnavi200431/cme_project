apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-secret-provider
  namespace: default
spec:
  provider: gcp
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: "db-password"
          key: DB_PASS
        - objectName: "api-key"
          key: API_KEY
  parameters:
    secrets: |
      - resourceName: "projects/my-project-app-477009/secrets/db-password"
        version: "latest"
      - resourceName: "projects/my-project-app-477009/secrets/api-key"
        version: "latest"
