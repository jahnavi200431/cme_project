apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-secrets-spc
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/my-project-app-477009/secrets/db-password"
        secretKey: "DB_PASS"
      - resourceName: "projects/my-project-app-477009/secrets/api-key"
        secretKey: "API_KEY"
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: DB_PASS
          key: DB_PASS
        - objectName: API_KEY
          key: API_KEY
